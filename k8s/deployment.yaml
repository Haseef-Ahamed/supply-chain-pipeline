apiVersion: apps/v1
kind: Deployment
metadata:
  name: hsf-app
  namespace: supply-chain-demo
  labels:
    app: hsf-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hsf-app
  template:
    metadata:
      labels:
        app: hsf-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hsf-app
          image: ghcr.io/haseef-ahamed/hsf-app:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
